name: Nightly

on:
  schedule:
    - cron: '0 */3 * * *' # Every 3 hours
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  cleanup:
    name: Cleanup old nightly release
    runs-on: ubuntu-latest
    steps:
    - name: Delete old nightly release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release delete nightly --cleanup-tag -y --repo ${{ github.repository }} || true

  nightly:
    name: Nightly Build
    needs: cleanup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Run tests
      run: go test ./...

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        DATE=$(date -u +%Y%m%d)
        SHA=$(git rev-parse --short HEAD)
        VERSION="nightly-${DATE}-${SHA}"
        BINARY_NAME=agent-factory
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME=$BINARY_NAME.exe
        fi
        ARCHIVE_NAME=agent-factory-nightly-${{ matrix.goos }}-${{ matrix.goarch }}
        mkdir -p dist
        go build -v -ldflags "-X main.version=${VERSION}" -o dist/$BINARY_NAME
        cd dist
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip ../${ARCHIVE_NAME}.zip $BINARY_NAME
        else
          tar czf ../${ARCHIVE_NAME}.tar.gz $BINARY_NAME
        fi

    - name: Upload to nightly release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly
        name: Nightly Build
        prerelease: true
        make_latest: false
        body: |
          Automated nightly build from `master` at ${{ github.sha }}.

          **This is a development build and may be unstable.**
        files: |
          *.tar.gz
          *.zip
